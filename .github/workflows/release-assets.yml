name: Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build, for example v0.9.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Verify release version
        run: |
          package_version="$(node -p 'require("./npm/package.json").version')"
          tag_version="${{ steps.tag.outputs.tag }}"
          tag_version="${tag_version#v}"
          if [ "$package_version" != "$tag_version" ]; then
            echo "npm/package.json version $package_version does not match release tag ${{ steps.tag.outputs.tag }}" >&2
            exit 1
          fi

      - name: Test npm wrapper
        run: node npm/scripts/test.js

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

      - name: Workflow acceptance
        run: bash scripts/workflow-acceptance.sh

      - name: Build release assets
        run: scripts/build-release-assets.sh "${{ steps.tag.outputs.tag }}"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.tag.outputs.tag }}" dist/*.tar.gz dist/checksums.txt --clobber
