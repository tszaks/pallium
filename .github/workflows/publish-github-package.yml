name: Publish GitHub npm Package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.9.3
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish-github-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: "@tszaks"

      - name: Prepare scoped package
        run: node scripts/prepare-github-npm-package.mjs

      - name: Publish to GitHub Packages
        run: npm publish dist/github-npm --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
