name: Publish GitHub npm Package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.9.3
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish-github-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@tszaks"

      - name: Prepare scoped package
        run: node scripts/prepare-github-npm-package.mjs

      - name: Publish to GitHub Packages
        run: |
          version="$(node -p 'require("./dist/github-npm/package.json").version')"
          tag_version="${{ inputs.tag }}"
          tag_version="${tag_version#v}"
          if [ "$version" != "$tag_version" ]; then
            echo "dist/github-npm/package.json version $version does not match release tag ${{ inputs.tag }}" >&2
            exit 1
          fi
          if npm view "@tszaks/pallium@$version" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "@tszaks/pallium@$version is already published"
          else
            npm publish ./dist/github-npm --registry=https://npm.pkg.github.com
          fi
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
