name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Test npm wrapper
        run: node npm/scripts/test.js

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1
