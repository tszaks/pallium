name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Test npm wrapper
        run: node npm/scripts/test.js

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

      - name: Workflow race tests
        run: go test -race ./internal/workflow -count=1

      - name: Govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...
          # Repo is already checked out above; skip the action's redundant
          # internal checkout (which fails under actions/checkout@v7's
          # credential handling).
          repo-checkout: false
