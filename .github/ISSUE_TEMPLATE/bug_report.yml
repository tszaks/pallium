name: Bug report
description: Report a reproducible Pallium problem
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal commands or steps to reproduce the issue.
      placeholder: |
        pallium version --json
        pallium ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Pallium version
      placeholder: Output from pallium version --json
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15, Ubuntu 24.04, etc.
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Remove secrets, tokens, private repo paths, and private transcript content.
      render: shell
